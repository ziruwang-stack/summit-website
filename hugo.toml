baseURL = 'https://riscv-summit-china.org/'
languageCode = 'zh-CN'
title = 'RISC-V Summit China 2026'
theme = 'ananke'
timeZone = "Asia/Shanghai"
recent_posts_number = 8
defaultContentLanguage = 'zh'
defaultContentLanguageInSubdir = false

[markup.goldmark.renderer]
  unsafe= true

[security]
  allowContent = ['^text/html$', '^text/markdown$']

[params]
  custom_css = ["custom.scss"]
  body_classes = "sans-serif"
  site_logo = "/img/riscv-logo.webp"
  date_img = "/img/date.webp"
  title_zh_img = "/img/riscvsummit-title-zh.webp"
  title_en_img = "/img/riscvsummit-title-en.webp"
  subtitle_img = "/img/riscvsummit-subtitle.webp"

[permalinks]
  [permalinks.page]
    posts = '/posts/:slug/'
    posts_redirect = '/posts/:slug/'
  [permalinks.section]
    posts = '/posts/'

[languages]
  [languages.zh]
    contentDir = 'content/zh'
    disabled = false
    languageCode = 'zh-CN'
    languageDirection = 'ltr'
    languageName = '简体中文'
    title = 'RISC-V 中国峰会 2026'
    copyright = 'RISC-V 中国峰会。'
    weight = 1
    hasCJKLanguage = true
    summaryLength = 230
    [languages.zh.params]
      date_format = "2006 年 1 月 2 日"
      date_format1 = "1 月 2 日"
      [[languages.zh.params.host]]
        name = "浙江大学杭州国际科创中心"
      [[languages.zh.params.co_host]]
        name = "国科大杭州高等研究院"
      [[languages.zh.params.co_host]]
        name = "RISC-V 工作委员会 (RVEI)"
      [[languages.zh.params.co_host]]
        name = "CRVA"
      [[languages.zh.params.organizer]]
        name = "浙江大学集成电路学院"
      [[languages.zh.params.organizer]]
        name = "上海苦芽科技有限公司"
      [[languages.zh.params.organizer]]
        name = "广州市智能软件产业研究院"
      [[languages.zh.params.co_organizer]]
        name = "CNRV"
      [[languages.zh.params.co_organizer]]
        name = "CRVA 浙江中心"
      [[languages.zh.params.co_organizer]]
        name = "CRVIC"
      [[languages.zh.params.co_organizer]]
        name = "中科（厦门）数据智能研究院"
      [[languages.zh.params.banners]]
      #  id   = 1
      #  text = '欢迎参加 RISC-V 中国峰会 2024'
        id   = 2
        text = 'RISC-V 中国峰会 2026 网站内容正在更新，敬请期待'
        link = ''
        link_text = ""
    [languages.zh.menu]
      [[languages.zh.menu.main]]
        name = "主页"
        url = "#"
        weight = 1
      [[languages.zh.menu.main]]
        name = "赞助商"
        url = "#sponsors"
        weight = 15
      [[languages.zh.menu.main]]
        name = "路线及酒店"
        url = "#venue"
        weight = 35
      [[languages.zh.menu.main]]
        name = "组织团队"
        url = "/organizing-teams"
        weight = 45
  [languages.en]
    contentDir = 'content/en'
    disabled = false
    languageCode = 'en-US'
    languageDirection = 'ltr'
    languageName = 'English'
    title = 'RISC-V Summit China 2026'
    copyright = 'RISC-V Summit China.'
